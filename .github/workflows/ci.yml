name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'examples/**'
      - '.gitignore'
      - 'assets/**'
      - '*.ipynb'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'examples/**'
      - '.gitignore'
      - 'assets/**'
      - '*.ipynb'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}-${{ matrix.python-version }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install .
          pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8 apdtflow tests

      - name: Run mypy
        run: mypy apdtflow

      # Pull requests run the fast suite; pushes to main also run the
      # slow learning/calibration regression tests (they train models).
      - name: Run tests (fast)
        if: github.event_name == 'pull_request'
        run: pytest -m "not slow" --maxfail=1 --disable-warnings -q --cov=apdtflow --cov-report=term-missing

      - name: Run tests (full, incl. slow)
        if: github.event_name == 'push'
        run: pytest --maxfail=1 --disable-warnings -q --cov=apdtflow --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          slug: yotambraun/APDTFlow
